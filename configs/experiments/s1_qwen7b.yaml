experiment:
  name: s1-qwen7b
  seed: 42
  split: dev

dataset:
  name: synthetic
  path: data/processed/synthetic-v1
  max_documents: 5
  questions_per_document: 2

runtime:
  device: cuda

model:
  compressor: Qwen/Qwen2.5-7B-Instruct
  reasoner: Qwen/Qwen2.5-7B-Instruct
  backend: transformers
  model_revision: main
  tokenizer_revision: main
  load_in_4bit: true
  temperature: 0.0

compression:
  budget: 128
  prompt_version: ism-v1
  max_regeneration_attempts: 3
  max_new_tokens: 256

conditions:
  - full_context
  - full_symbol_dict
  - symbol_only

output:
  artifact_dir: artifacts
  save_raw_generations: true
  checkpoint_every: 10

execution_budget:
  stage: S1
  max_documents: 5
  max_questions_per_document: 2
  max_conditions: 3
  max_budgets: 1
  max_seeds: 1
  max_generation_attempts: 3
  max_new_tokens: 256
  max_gpu_hours: 0.5
  stop_on_error_rate: 0.02
  stop_on_parse_failure_rate: 0.05
